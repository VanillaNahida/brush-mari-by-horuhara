<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Brush Mari</title>
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="stage-status" aria-label="quiet status">
        <div class="top-controls">
          <div class="left-controls">
            <button id="pauseButton" class="pause-button" type="button">PAUSE</button>
            <label class="volume-control" aria-label="sound volume">
              <span>VOL</span>
              <input id="volumeRange" type="range" min="0" max="100" value="80" />
            </label>
          </div>
          <div class="hud-actions">
            <button id="twitterButton" class="twitter-button" type="button" aria-label="creator sns">SNS</button>
            <button id="restart" class="restart" type="button" aria-label="restart">RETRY</button>
            <button id="languageToggle" class="language-toggle" type="button">English</button>
          </div>
        </div>
        <div class="sneeze-meter">
          <span>SNEEZE</span>
          <div class="sneeze-track"><i id="sneezeFill"></i></div>
        </div>
      </section>

      <section class="stage-wrap">
        <div id="timeDial" class="time-dial" aria-label="time remaining"></div>
        <button id="infiniteToggle" class="infinite-toggle" type="button" aria-label="infinite mode"></button>
        <div class="stage-score">
          <strong id="score">0</strong>
        </div>
        <div class="best-score">
          <span>BEST</span>
          <strong id="bestScore">0</strong>
        </div>
        <button id="achievementButton" class="achievement-button" type="button" aria-label="achievements"></button>
        <div id="modeLabel" class="mode-label">BASIC</div>
        <button id="shareButton" class="share-button" type="button" hidden>SHARE</button>
        <canvas id="game" width="800" height="1020" aria-label="Mari brushing game"></canvas>
        <div id="achievementPanel" class="achievement-panel" hidden>
          <div class="achievement-card">
            <div class="achievement-head">
              <strong>ACHIEVEMENTS</strong>
              <button id="achievementClose" type="button" aria-label="close achievements">X</button>
            </div>
            <ul id="achievementList" class="achievement-list"></ul>
          </div>
        </div>
        <div id="achievementToast" class="achievement-toast" hidden></div>
        <div id="modeUnlockToast" class="mode-unlock-toast" hidden></div>
        <div id="startOverlay" class="overlay">
          <h1>Brush Mari</h1>
          <p>Brush Mari in secret.</p>
          <button id="start" type="button">START</button>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
<script defer src="https://static.itch.io/htmlgame.js" type="text/javascript"></script>
